<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>R&D Hours Tracker — Kennewell</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px }
.card { background:#1c1c1e; padding:20px; border-radius:10px }
label { display:block; margin-top:10px; font-size:12px; color:#aaa }
input, select, textarea { width:100%; padding:10px; margin-top:5px; background:#2c2c2e; color:#fff; border:none; border-radius:6px }
button { margin-top:15px; padding:12px; background:#f5b800; border:none; font-weight:bold; cursor:pointer }
</style>
</head>

<body>

<h2>R&D Hours Tracker</h2>

<div class="card">

<label>Name</label>
<select id="log-name"></select>

<label>Week Ending</label>
<input type="date" id="log-date">

<label>Hours</label>
<input type="number" id="log-hours">

<label>Project</label>
<select id="log-project" onchange="handleProjectSelect()"></select>

<div id="custom-project-wrap" style="display:none">
  <label>Add Project</label>
  <input type="text" id="custom-project">
</div>

<label>Description</label>
<textarea id="log-desc"></textarea>

<button onclick="submitEntry()">Submit</button>

</div>

<script>
const SUPABASE_URL = "https://hyxdrdqgkyittgkkqzqp.supabase.co";
const SUPABASE_KEY = "sb_publishable_lql8v4QDV_R_G2lXE07g3w_fvDPEzcL";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_TEAM = ["Mitchell","Brett","Darren"];
const DEFAULT_PROJECTS = ["Automation","AI","Redarc","Add Project"];

let team = [...DEFAULT_TEAM];
let projects = [...DEFAULT_PROJECTS];

function populateNames(){
  document.getElementById("log-name").innerHTML =
    '<option value="">Select</option>' +
    team.map(n=>`<option>${n}</option>`).join('');
}

function populateProjects(){
  document.getElementById("log-project").innerHTML =
    '<option value="">Select</option>' +
    projects.map(p=>`<option>${p}</option>`).join('');
}

function handleProjectSelect(){
  const val = document.getElementById("log-project").value;
  document.getElementById("custom-project-wrap").style.display =
    val==="Add Project"?"block":"none";
}

async function loadProjects(){
  const { data } = await db.from("rd_entries")
    .select("description")
    .eq("name","__project_config__")
    .limit(1);

  if(data && data.length){
    projects = JSON.parse(data[0].description);
  }
  populateProjects();
}

async function saveProjects(){
  const { data } = await db.from("rd_entries")
    .select("id")
    .eq("name","__project_config__")
    .limit(1);

  if(data && data.length){
    await db.from("rd_entries")
      .update({description:JSON.stringify(projects)})
      .eq("name","__project_config__");
  } else {
    await db.from("rd_entries").insert({
      name:"__project_config__",
      date:"2000-01-01",
      hours:0,
      description:JSON.stringify(projects),
      month:"",
      fy:""
    });
  }
}

async function submitEntry(){
  let name = document.getElementById("log-name").value;
  let date = document.getElementById("log-date").value;
  let hours = document.getElementById("log-hours").value;
  let desc = document.getElementById("log-desc").value;

  let project = document.getElementById("log-project").value;

  if(project==="Add Project"){
    const custom = document.getElementById("custom-project").value.trim();
    if(!custom) return alert("Enter project");

    project = custom;

    if(!projects.includes(custom)){
      projects.splice(projects.length-1,0,custom);
      await saveProjects();
      populateProjects();
    }
  }

  await db.from("rd_entries").insert({
    name,
    date,
    hours,
    description:desc,
    project
  });

  alert("Saved");
}

populateNames();
loadProjects();
</script>

</body>
</html>
