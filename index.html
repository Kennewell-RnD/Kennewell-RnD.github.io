<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kennewell — Laser Engraving Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --k-black:#0A0A0A;--k-dark:#111111;--k-surface:#1A1A1A;--k-panel:#202020;
  --k-border:#2A2A2A;--k-border-lit:#3A3A3A;--k-gold:#F0A500;--k-gold-dim:#B87D00;
  --k-gold-glow:rgba(240,165,0,0.15);--k-silver:#8A8A8A;--k-silver-light:#C8C4BE;
  --k-white:#F0EDE8;--k-muted:#666;--k-text:#DEDAD4;--k-text-dim:#888580;
  --k-green:#22C55E;--k-red:#EF4444;--k-amber:#F59E0B;
  --glass:rgba(255,255,255,0.03);--glass-border:rgba(255,255,255,0.08);
}
html,body{height:100%;background:var(--k-black);color:var(--k-text);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.6;overflow:hidden}

/* LOGIN SCREEN */
.login-screen{position:fixed;inset:0;background:var(--k-black);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:var(--k-dark);border:1px solid var(--k-border-lit);border-radius:8px;padding:40px;width:420px;text-align:center}
.login-logo{height:40px;width:auto;margin-bottom:24px}
.login-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--k-gold-dim);margin-bottom:8px}
.login-sub{font-size:13px;color:var(--k-text-dim);margin-bottom:28px}
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.name-btn{background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:3px;padding:10px;font-size:14px;font-family:'Barlow',sans-serif;color:var(--k-text);cursor:pointer;transition:all .15s}
.name-btn:hover{border-color:var(--k-gold);color:var(--k-gold)}
.name-btn.selected{background:var(--k-gold-glow);border-color:var(--k-gold);color:var(--k-gold);font-weight:500}
.login-btn{width:100%;padding:14px;border-radius:3px;border:none;background:var(--k-gold);color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;margin-top:8px;transition:all .15s}
.login-btn:hover:not(:disabled){background:#FFB800}
.login-btn:disabled{background:var(--k-border);color:var(--k-muted);cursor:not-allowed}
.admin-link{margin-top:16px;font-size:12px;color:var(--k-muted);cursor:pointer;text-decoration:underline}
.admin-link:hover{color:var(--k-silver)}
.admin-input-row{display:flex;gap:8px;margin-top:12px}
.admin-input{flex:1;background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:3px;padding:10px 12px;font-size:14px;font-family:'Barlow',sans-serif;color:var(--k-text);outline:none}
.admin-input:focus{border-color:var(--k-gold-dim)}
.admin-input::placeholder{color:var(--k-muted)}
.error-msg{font-size:12px;color:var(--k-red);margin-top:8px}

/* TOPBAR */
.topbar{background:var(--k-dark);border-bottom:1px solid var(--k-border);padding:0 24px;height:70px;display:flex;align-items:center;justify-content:space-between;position:relative;flex-shrink:0}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--k-gold) 0%,rgba(240,165,0,0.3) 50%,transparent 100%)}
.brand{display:flex;align-items:center;gap:20px}
.brand img{height:36px;width:auto}
.brand-divider{width:1px;height:36px;background:var(--k-border-lit);margin:0 4px}
.brand-module{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--k-gold-dim)}
.topbar-right{display:flex;align-items:center;gap:16px}
.live-indicator{display:flex;align-items:center;gap:8px}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--k-green);box-shadow:0 0 8px var(--k-green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 6px var(--k-green)}50%{box-shadow:0 0 16px var(--k-green)}}
.live-text{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--k-green);font-weight:600}
.new-badge{background:var(--k-gold);color:var(--k-black);font-size:13px;font-weight:700;padding:5px 12px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;display:none}
.clock{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;color:var(--k-silver-light);letter-spacing:3px}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:3px;padding:6px 12px;cursor:pointer;transition:all .15s}
.user-pill:hover{border-color:var(--k-silver)}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--k-gold);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--k-black)}
.user-name{font-size:13px;color:var(--k-silver-light);font-weight:500}
.admin-badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--k-gold);background:var(--k-gold-glow);border:1px solid rgba(240,165,0,.3);border-radius:2px;padding:2px 6px;font-family:'Barlow Condensed',sans-serif;font-weight:700}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh}
.main-area{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden}

/* TABS */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--k-border);background:var(--k-dark);flex-shrink:0}
.tab{padding:12px 20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--k-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--k-silver-light)}
.tab.active{color:var(--k-gold);border-bottom-color:var(--k-gold)}

/* SIDEBAR */
.sidebar{background:var(--k-dark);border-right:1px solid var(--k-border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--k-border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.sidebar-top{display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--k-silver)}
.filter-row{display:flex;gap:4px}
.filter-btn{font-size:11px;padding:4px 10px;border-radius:2px;border:1px solid var(--k-border-lit);background:transparent;color:var(--k-muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600;transition:all .15s}
.filter-btn.active{background:var(--k-gold);color:var(--k-black);border-color:var(--k-gold)}
.filter-btn:hover:not(.active){border-color:var(--k-silver);color:var(--k-silver-light)}
.search-box{background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:3px;padding:7px 10px;font-size:13px;font-family:'Barlow',sans-serif;color:var(--k-text);outline:none;width:100%}
.search-box:focus{border-color:var(--k-gold-dim)}
.search-box::placeholder{color:var(--k-muted)}
.order-list{flex:1;overflow-y:auto}
.order-card{padding:12px 14px;border-bottom:1px solid var(--k-border);cursor:pointer;transition:background .1s;position:relative}
.order-card:hover{background:rgba(255,255,255,0.025)}
.order-card.selected{background:var(--k-gold-glow);border-left:3px solid var(--k-gold)}
.order-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.order-num{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--k-white);letter-spacing:1px}
.order-card.selected .order-num{color:var(--k-gold)}
.order-time{font-size:11px;color:var(--k-text-dim)}
.order-customer{font-size:13px;color:var(--k-silver);margin-bottom:5px}
.order-actioned{font-size:11px;color:var(--k-text-dim);margin-bottom:5px;font-style:italic}
.tag-row{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;font-weight:600;text-transform:uppercase}
.tag.new{background:rgba(245,158,11,.2);color:#FBBF24;border:1px solid rgba(245,158,11,.4)}
.tag.processing{background:rgba(240,165,0,.15);color:var(--k-gold);border:1px solid rgba(240,165,0,.35)}
.tag.done{background:rgba(138,138,138,.12);color:var(--k-silver);border:1px solid var(--k-border-lit)}
.tag.file{background:rgba(34,197,94,.15);color:#4ADE80;border:1px solid rgba(34,197,94,.35)}
.tag.nofile{background:rgba(239,68,68,.12);color:#F87171;border:1px solid rgba(239,68,68,.3)}
.state-msg{padding:40px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--k-muted)}

/* MAIN */
.main{background:var(--k-surface);overflow-y:auto;padding:24px}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--k-muted)}
.alert-bar{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);border-radius:4px;padding:11px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.alert-text{font-size:13px;color:#FBBF24;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.alert-btn{font-size:12px;padding:6px 14px;border-radius:3px;border:1px solid rgba(245,158,11,.5);background:rgba(245,158,11,.1);color:#FBBF24;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:700;transition:all .15s}
.alert-btn:hover{background:rgba(245,158,11,.2)}
.main-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--k-border)}
.main-order-id{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:var(--k-gold);letter-spacing:2px}
.main-customer{font-size:15px;color:var(--k-silver);margin-top:3px}
.main-product{font-size:13px;color:var(--k-text-dim);margin-top:2px}
.main-actioned{font-size:12px;color:var(--k-text-dim);margin-top:3px;font-style:italic}
.status-select{font-size:12px;padding:8px 12px;border-radius:3px;border:1px solid var(--k-border-lit);background:var(--k-panel);color:var(--k-text);cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.section{background:var(--glass);border:1px solid var(--glass-border);border-radius:4px;padding:16px 18px;margin-bottom:14px}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--k-gold-dim);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--k-border)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-key{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--k-text-dim);margin-bottom:4px;font-weight:600}
.detail-val{font-size:16px;color:var(--k-white);font-weight:500}
.notes-box{background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:3px;padding:12px 14px;font-size:14px;color:var(--k-silver-light);margin-top:10px;line-height:1.6;font-style:italic}
.file-row{display:flex;align-items:center;gap:14px;background:var(--k-panel);border:1px solid rgba(34,197,94,.25);border-radius:3px;padding:12px 16px}
.file-ext{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;color:#4ADE80;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:2px;padding:5px 10px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:14px;color:var(--k-white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-sub{font-size:12px;color:var(--k-text-dim);margin-top:2px}
.file-btns{display:flex;gap:8px;flex-shrink:0}
.btn-ghost{font-size:12px;padding:7px 16px;border-radius:3px;border:1px solid var(--k-border-lit);background:transparent;color:var(--k-silver-light);cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600;transition:all .15s;text-decoration:none;display:inline-block}
.btn-ghost:hover{border-color:var(--k-gold);color:var(--k-gold)}
.template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tmpl{background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:4px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .15s;position:relative;overflow:hidden}
.tmpl::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent;transition:background .15s}
.tmpl:hover{border-color:var(--k-silver);background:rgba(255,255,255,0.04)}
.tmpl.selected{border-color:var(--k-gold);background:var(--k-gold-glow)}
.tmpl.selected::before{background:var(--k-gold)}
.tmpl-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;color:var(--k-silver-light);text-transform:uppercase;margin-bottom:4px}
.tmpl.selected .tmpl-name{color:var(--k-gold)}
.tmpl-sub{font-size:12px;color:var(--k-text-dim)}
.tmpl-preset{font-size:10px;color:var(--k-muted);margin-top:3px}
.tmpl.selected .tmpl-sub,.tmpl.selected .tmpl-preset{color:var(--k-gold-dim)}
.notes-area{width:100%;background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:3px;padding:12px 14px;font-size:14px;font-family:'Barlow',sans-serif;color:var(--k-text);resize:none;height:68px;outline:none;transition:border-color .15s}
.notes-area:focus{border-color:var(--k-gold-dim)}
.notes-area::placeholder{color:var(--k-muted)}
.action-row{display:flex;gap:10px;margin-top:12px}
.btn-fire{flex:1;padding:16px;border-radius:4px;border:none;background:var(--k-gold);color:#000;font-size:16px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:2.5px;text-transform:uppercase;transition:all .15s}
.btn-fire:hover:not(:disabled){background:#FFB800;box-shadow:0 0 24px rgba(240,165,0,0.4)}
.btn-fire:disabled{background:#2A2A2A;color:#555;cursor:not-allowed}
.btn-done{padding:16px 22px;border-radius:4px;border:1px solid var(--k-border-lit);background:transparent;color:var(--k-silver-light);font-size:15px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;transition:all .15s}
.btn-done:hover{border-color:var(--k-gold);color:var(--k-gold)}

/* LOG TAB */
.log-panel{padding:24px;overflow-y:auto;height:100%}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.log-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--k-white)}
.log-table{width:100%;border-collapse:collapse}
.log-table th{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--k-text-dim);padding:10px 14px;text-align:left;border-bottom:1px solid var(--k-border);font-weight:600}
.log-table td{padding:12px 14px;border-bottom:1px solid var(--k-border);font-size:13px;color:var(--k-text)}
.log-table tr:hover td{background:rgba(255,255,255,0.02)}
.log-user{font-weight:500;color:var(--k-silver-light)}
.log-action-new{color:#FBBF24}
.log-action-processing{color:var(--k-gold)}
.log-action-done{color:#4ADE80}
.log-time{color:var(--k-text-dim);font-size:12px}

/* ADMIN TAB */
.admin-panel{padding:24px;overflow-y:auto;height:100%}
.admin-section{background:var(--glass);border:1px solid var(--glass-border);border-radius:4px;padding:20px;margin-bottom:16px}
.admin-section-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--k-gold-dim);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.admin-section-title::after{content:'';flex:1;height:1px;background:var(--k-border)}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.user-item{display:flex;align-items:center;justify-content:space-between;background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:3px;padding:10px 14px}
.user-item-name{font-size:14px;color:var(--k-white);font-weight:500}
.btn-remove{font-size:11px;padding:4px 10px;border-radius:2px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#F87171;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600;transition:all .15s}
.btn-remove:hover{background:rgba(239,68,68,.2)}
.add-user-row{display:flex;gap:8px}
.add-user-input{flex:1;background:var(--k-panel);border:1px solid var(--k-border-lit);border-radius:3px;padding:10px 12px;font-size:14px;font-family:'Barlow',sans-serif;color:var(--k-text);outline:none}
.add-user-input:focus{border-color:var(--k-gold-dim)}
.add-user-input::placeholder{color:var(--k-muted)}
.btn-add{padding:10px 18px;border-radius:3px;border:1px solid rgba(34,197,94,.3);background:rgba(34,197,94,.08);color:#4ADE80;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600;font-size:12px;transition:all .15s}
.btn-add:hover{background:rgba(34,197,94,.15)}

/* CONFIRM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--k-dark);border:1px solid var(--k-border-lit);border-radius:8px;padding:32px;width:380px;text-align:center}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--k-white);margin-bottom:10px}
.modal-text{font-size:14px;color:var(--k-text-dim);margin-bottom:24px;line-height:1.6}
.modal-btns{display:flex;gap:10px}
.modal-confirm{flex:1;padding:12px;border-radius:3px;border:none;background:var(--k-gold);color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase}
.modal-cancel{flex:1;padding:12px;border-radius:3px;border:1px solid var(--k-border-lit);background:transparent;color:var(--k-silver-light);font-size:14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->

<script>

const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0eGlyeWx6d3lleHVlcGlmbXBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTY4MjgsImV4cCI6MjA5MTY5MjgyOH0.joHDVnDLB62NcoaU-pn9HTWJGlUhIVE53xw4xp1icnI';
const HEADERS={'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json'};
const ADMIN_PASS='cncadmin';
const TEMPLATES=[
  {name:'SS Black',sub:'Black mark on stainless',preset:'Steel (Engraving)'},
  {name:'SS Gold',sub:'Gold/amber on stainless',preset:'Steel (Annealing)'},
  {name:'SS Blue',sub:'Blue mark on stainless',preset:'Blue'},
  {name:'Aluminium',sub:'Standard aluminium mark',preset:'Aluminium Anodized'},
  {name:'Deep Alum',sub:'Deep etch aluminium',preset:'Deep Aluminium'},
  {name:'Galv Tag',sub:'Galvanised dog tag',preset:'BAE Galvanised Tag'},
];

let orders=[],selected=null,currentFilter='new',searchTerm='',currentUser=null,isAdmin=false,activityLog=[];

let modalCallback=null;

// LOGIN
function renderNameGrid(){
  const grid=document.getElementById('name-grid');
  grid.innerHTML=staffList.map(n=>`<button class="name-btn" onclick="selectName('${n}',this)">${n}</button>`).join('');
}

function selectName(name,btn){
  document.querySelectorAll('.name-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  currentUser=name;
  document.getElementById('login-btn').disabled=false;
}

function toggleAdminLogin(){
  const row=document.getElementById('admin-login-row');
  row.style.display=row.style.display==='none'?'block':'none';
}

function doAdminLogin(){
  const pass=document.getElementById('admin-pass').value;
  if(pass===ADMIN_PASS){
    currentUser='Admin';isAdmin=true;
    showApp();
  } else {
    document.getElementById('admin-error').textContent='Incorrect password';
  }
}

function doLogin(){
  if(!currentUser) return;
  showApp();
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const initials=currentUser.substring(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent=initials;
  document.getElementById('user-name-display').textContent=currentUser;
  if(isAdmin){
    document.getElementById('admin-badge').style.display='inline-block';
    document.getElementById('admin-tab').style.display='block';
  }
  fetchOrders();setInterval(fetchOrders,30000);
  tick();setInterval(tick,10000);
}

function logout(){
  currentUser=null;isAdmin=false;selected=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-btn').disabled=true;
  document.getElementById('admin-badge').style.display='none';
  document.getElementById('admin-tab').style.display='none';
  document.querySelectorAll('.name-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('admin-pass').value='';
  document.getElementById('admin-error').textContent='';
  document.getElementById('admin-login-row').style.display='none';
}

// TABS
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-orders').style.display=tab==='orders'?'flex':'none';
  document.getElementById('tab-done').style.display=tab==='done'?'flex':'none';
  document.getElementById('tab-log').style.display=tab==='log'?'flex':'none';
  document.getElementById('tab-admin').style.display=tab==='admin'?'flex':'none';
  if(tab==='done') renderDone();
  if(tab==='log') renderLog();
  if(tab==='admin') renderAdminUsers();
}

// DATA
async function fetchOrders(){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/orders?select=*&order=created_at.desc`,{headers:HEADERS});
    if(!res.ok) throw new Error(`${res.status}`);
    const data=await res.json();
    if(Array.isArray(data)){
      orders=data;
      if(selected) selected=orders.find(o=>o.id===selected.id)||null;
      renderList();updateBadge();
    }
  }catch(e){
    document.getElementById('order-list').innerHTML=`<div class="state-msg">Error loading orders</div>`;
  }
}

async function patchOrder(id,fields){
  await fetch(`${SUPA_URL}/rest/v1/orders?id=eq.${id}`,{
    method:'PATCH',headers:{...HEADERS,'Prefer':'return=minimal'},body:JSON.stringify(fields)
  });
}

function logAction(order,action,note=''){
  const entry={time:new Date().toLocaleString('en-AU'),user:currentUser,order:order.shopify_order_id||'#—',action,note};
  activityLog.unshift(entry);
  // Also append to order's user_log
  const existing=order.user_log?JSON.parse(order.user_log):[];
  existing.unshift(entry);
  patchOrder(order.id,{user_log:JSON.stringify(existing)});
}

function updateBadge(){
  const n=orders.filter(o=>o.status==='new').length;
  const el=document.getElementById('new-badge');
  el.textContent=n+' NEW';el.style.display=n>0?'inline-block':'none';
}

function formatTime(ts){
  if(!ts) return '';
  const d=new Date(ts),now=new Date(),diff=now-d;
  if(diff<86400000) return d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  if(diff<172800000) return 'Yesterday';
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}

function getExt(f){return f?f.split('.').pop().toUpperCase():'';}

function filterOrders(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderList();
}

function searchOrders(val){searchTerm=val.toLowerCase();renderList();}

function getFiltered(){
  return orders.filter(o=>{
    const matchFilter=currentFilter==='all'?o.status!=='done':o.status===currentFilter;
    const matchSearch=!searchTerm||
      (o.customer_name||'').toLowerCase().includes(searchTerm)||
      (o.shopify_order_id||'').toLowerCase().includes(searchTerm);
    return matchFilter&&matchSearch;
  });
}

function renderList(){
  const list=document.getElementById('order-list');
  const filtered=getFiltered();
  if(!filtered.length){list.innerHTML='<div class="state-msg">No orders</div>';return;}
  list.innerHTML=filtered.map(o=>`
    <div class="order-card${selected&&selected.id===o.id?' selected':''}" onclick="selectOrder(${o.id})">
      <div class="order-top">
        <span class="order-num">${o.shopify_order_id||'#—'}</span>
        <span class="order-time">${formatTime(o.created_at)}</span>
      </div>
      <div class="order-customer">${o.customer_name||'Unknown'} · Qty ${o.quantity||'—'}</div>
      ${o.actioned_by?`<div class="order-actioned">Last: ${o.actioned_by}</div>`:''}
      <div class="tag-row">
        <span class="tag ${o.status||'new'}">${o.status==='processing'?'Active':o.status==='done'?'Done':'New'}</span>
        ${o.file_name?`<span class="tag file">${getExt(o.file_name)}</span>`:'<span class="tag nofile">No file</span>'}
        ${o.template?`<span class="tag processing">${o.template}</span>`:''}
      </div>
    </div>
  `).join('');
}

function selectOrder(id){
  selected=orders.find(o=>o.id===id);
  renderList();renderMain();
}

async function setTemplate(name){
  if(!selected) return;
  selected.template=selected.template===name?null:name;
  await patchOrder(selected.id,{template:selected.template});
  renderMain();renderList();
}

async function setStatus(val){
  if(!selected) return;
  selected.status=val;
  const actionedStr=`${currentUser} — ${new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}`;
  selected.actioned_by=actionedStr;
  logAction(selected,val);
  await patchOrder(selected.id,{status:val,actioned_by:actionedStr});
  updateBadge();renderList();renderMain();
}

function confirmMarkDone(){
  showModal('Mark as done?',`Confirm that order ${selected.shopify_order_id} for ${selected.customer_name} is complete.`,()=>setStatus('done'));
}

async function saveNotes(val){
  if(!selected) return;
  selected.workshop_notes=val;
  await patchOrder(selected.id,{workshop_notes:val});
}

// MODAL
function showModal(title,text,onConfirm){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-text').textContent=text;
  document.getElementById('modal-confirm').onclick=()=>{closeModal();onConfirm();};
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

// MAIN PANEL
function renderMain(){
  const panel=document.getElementById('main-panel');
  if(!selected){panel.innerHTML='<div class="empty-state">Select an order to begin</div>';return;}
  const o=selected;
  const tmpl=TEMPLATES.find(t=>t.name===o.template);
  panel.innerHTML=`
    ${o.status==='new'?`<div class="alert-bar"><span class="alert-text">Unactioned — new order</span><button class="alert-btn" onclick="setStatus('processing')">Start job</button></div>`:''}
    <div class="main-header">
      <div>
        <div class="main-order-id">${o.shopify_order_id||'#—'}</div>
        <div class="main-customer">${o.customer_name||'—'} · ${o.customer_email||'—'}</div>
        <div class="main-product">${o.product||'—'} · Qty ${o.quantity||'—'} · ${formatTime(o.created_at)}</div>
        ${o.actioned_by?`<div class="main-actioned">Last actioned by: ${o.actioned_by}</div>`:''}
      </div>
      <select class="status-select" onchange="setStatus(this.value)">
        <option value="new"${o.status==='new'?' selected':''}>New</option>
        <option value="processing"${o.status==='processing'?' selected':''}>Active</option>
        <option value="done"${o.status==='done'?' selected':''}>Done</option>
      </select>
    </div>
    <div class="section">
      <div class="section-label">Order details</div>
      <div class="detail-grid">
        <div><div class="detail-key">Customer</div><div class="detail-val">${o.customer_name||'—'}</div></div>
        <div><div class="detail-key">Order ID</div><div class="detail-val">${o.shopify_order_id||'—'}</div></div>
        <div><div class="detail-key">Product</div><div class="detail-val">${o.product||'—'}</div></div>
        <div><div class="detail-key">Quantity</div><div class="detail-val">${o.quantity||'—'} units</div></div>
      </div>
      ${o.customer_notes?`<div class="notes-box">"${o.customer_notes}"</div>`:''}
    </div>
    <div class="section">
      <div class="section-label">Design file</div>
      ${o.file_name?`
        <div class="file-row">
          <span class="file-ext">${getExt(o.file_name)}</span>
          <div class="file-info"><div class="file-name">${o.file_name}</div><div class="file-sub">Customer uploaded file</div></div>
          <div class="file-btns">${o.file_url?`<a class="btn-ghost" href="${o.file_url}" target="_blank">Download</a>`:''}</div>
        </div>
      `:`<div style="font-size:13px;color:var(--k-text-dim);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase">No file — text instructions only</div>`}
    </div>
    <div class="section">
      <div class="section-label">Laser template — SpeedMark preset</div>
      <div class="template-grid">
        ${TEMPLATES.map(t=>`<div class="tmpl${o.template===t.name?' selected':''}" onclick="setTemplate('${t.name}')"><div class="tmpl-name">${t.name}</div><div class="tmpl-sub">${t.sub}</div><div class="tmpl-preset">${t.preset}</div></div>`).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-label">Workshop notes</div>
      <textarea class="notes-area" placeholder="Internal notes for the team..." onchange="saveNotes(this.value)">${o.workshop_notes||''}</textarea>
      <div class="action-row">
        <button class="btn-fire" id="fire-btn" ${!o.template?'disabled':''} onclick="sendToLaser()">
          ${o.template?`Fire — ${o.template} · ${tmpl?tmpl.preset:''}` :'Select a template to continue'}
        </button>
        <button class="btn-done" onclick="confirmMarkDone()">Mark done</button>
      </div>
    </div>
    ${o.user_log?`
    <div class="section">
      <div class="section-label">Order history</div>
      <table class="log-table">
        <thead><tr><th>Time</th><th>User</th><th>Action</th></tr></thead>
        <tbody>
          ${JSON.parse(o.user_log).map(e=>`<tr><td class="log-time">${e.time}</td><td class="log-user">${e.user}</td><td class="log-action-${e.action}">${e.action}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>`:''}
  `;
}

function sendToLaser(){
  if(!selected||!selected.template) return;
  const o=selected;
  const tmpl=TEMPLATES.find(t=>t.name===o.template);
  const jobContent=[
    'KENNEWELL LASER JOB','==================',
    `Order:     ${o.shopify_order_id}`,`Customer:  ${o.customer_name}`,
    `Product:   ${o.product}`,`Quantity:  ${o.quantity}`,
    `Template:  ${o.template}`,`Preset:    ${tmpl?tmpl.preset:''}`,
    `File:      ${o.file_name||'No file — text only'}`,
    `Notes:     ${o.customer_notes||'None'}`,`Workshop:  ${o.workshop_notes||'None'}`,
    `Operator:  ${currentUser}`,'',
    'SpeedMark Instructions:',
    `1. Open SpeedMark preset: "${tmpl?tmpl.preset:''}"`,
    `2. Import customer file: ${o.file_name||'N/A'}`,
    '3. Position item and verify preview','4. Press Execute to mark',
  ].join('\n');
  const blob=new Blob([jobContent],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${o.shopify_order_id}_JOB.txt`;a.click();
  URL.revokeObjectURL(url);
  if(o.file_url){setTimeout(()=>{const b=document.createElement('a');b.href=o.file_url;b.download=`${o.shopify_order_id}_${o.file_name}`;b.target='_blank';b.click();},500);}
  const btn=document.getElementById('fire-btn');
  btn.textContent='Files downloaded — open in SpeedMark';
  btn.disabled=true;btn.style.background='#22C55E';btn.style.color='#000';
  logAction(o,'fired',o.template);
  setStatus('processing');
}

// DONE TAB
let selectedDone=null;
function renderDone(){
  const panel=document.getElementById('done-panel');
  const done=orders.filter(o=>o.status==='done');
  if(!done.length){panel.innerHTML='<div class="empty-state">No completed orders yet</div>';return;}
  panel.innerHTML=`<div style="display:grid;grid-template-columns:280px 1fr;height:100%;overflow:hidden">
    <div style="border-right:1px solid var(--k-border);overflow-y:auto">
      ${done.map(o=>`
        <div onclick="selectDoneOrder(${o.id})" style="padding:12px 14px;border-bottom:1px solid var(--k-border);cursor:pointer;background:${selectedDone&&selectedDone.id===o.id?'var(--k-gold-glow)':'transparent'};border-left:${selectedDone&&selectedDone.id===o.id?'3px solid var(--k-gold)':'3px solid transparent'};transition:all .1s">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:${selectedDone&&selectedDone.id===o.id?'var(--k-gold)':'var(--k-white)'};letter-spacing:1px">${o.shopify_order_id||'#—'}</span>
            <span style="font-size:11px;color:var(--k-text-dim)">${formatTime(o.created_at)}</span>
          </div>
          <div style="font-size:13px;color:var(--k-silver);margin-bottom:4px">${o.customer_name||'Unknown'} · Qty ${o.quantity||'—'}</div>
          <div style="font-size:11px;color:var(--k-text-dim);font-style:italic">${o.actioned_by||''}</div>
        </div>
      `).join('')}
    </div>
    <div style="overflow-y:auto;padding:24px" id="done-detail">
      <div class="empty-state">Select a completed order</div>
    </div>
  </div>`;
  if(selectedDone) renderDoneDetail();
}

function selectDoneOrder(id){
  selectedDone=orders.find(o=>o.id===id);
  renderDone();
}

function renderDoneDetail(){
  const panel=document.getElementById('done-detail');
  if(!panel||!selectedDone) return;
  const o=selectedDone;
  const tmpl=TEMPLATES.find(t=>t.name===o.template);
  panel.innerHTML=`
    <div class="main-header">
      <div>
        <div class="main-order-id">${o.shopify_order_id||'#—'}</div>
        <div class="main-customer">${o.customer_name||'—'} · ${o.customer_email||'—'}</div>
        <div class="main-product">${o.product||'—'} · Qty ${o.quantity||'—'} · ${formatTime(o.created_at)}</div>
        ${o.actioned_by?`<div class="main-actioned">Completed by: ${o.actioned_by}</div>`:''}
      </div>
      <span class="tag done" style="font-size:13px;padding:6px 14px">Done</span>
    </div>
    <div class="section">
      <div class="section-label">Order details</div>
      <div class="detail-grid">
        <div><div class="detail-key">Customer</div><div class="detail-val">${o.customer_name||'—'}</div></div>
        <div><div class="detail-key">Order ID</div><div class="detail-val">${o.shopify_order_id||'—'}</div></div>
        <div><div class="detail-key">Product</div><div class="detail-val">${o.product||'—'}</div></div>
        <div><div class="detail-key">Quantity</div><div class="detail-val">${o.quantity||'—'} units</div></div>
      </div>
      ${o.customer_notes?`<div class="notes-box">"${o.customer_notes}"</div>`:''}
    </div>
    <div class="section">
      <div class="section-label">Design file</div>
      ${o.file_name?`
        <div class="file-row">
          <span class="file-ext">${getExt(o.file_name)}</span>
          <div class="file-info"><div class="file-name">${o.file_name}</div><div class="file-sub">Customer uploaded file</div></div>
          <div class="file-btns">${o.file_url?`<a class="btn-ghost" href="${o.file_url}" target="_blank">Download</a>`:''}</div>
        </div>
      `:`<div style="font-size:13px;color:var(--k-text-dim);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase">No file — text instructions only</div>`}
    </div>
    ${o.template?`<div class="section"><div class="section-label">Laser template used</div><div style="font-size:15px;color:var(--k-silver-light);font-weight:500">${o.template} <span style="font-size:12px;color:var(--k-text-dim)">— ${tmpl?tmpl.preset:''}</span></div></div>`:''}
    ${o.workshop_notes?`<div class="section"><div class="section-label">Workshop notes</div><div class="notes-box">${o.workshop_notes}</div></div>`:''}
    ${o.user_log?`
    <div class="section">
      <div class="section-label">Order history</div>
      <table class="log-table">
        <thead><tr><th>Time</th><th>User</th><th>Action</th></tr></thead>
        <tbody>
          ${JSON.parse(o.user_log).map(e=>`<tr><td class="log-time">${e.time}</td><td class="log-user">${e.user}</td><td class="log-action-${e.action}">${e.action}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>`:''}
  `;
}

// LOG TAB
function renderLog(){
  const tbody=document.getElementById('log-tbody');
  // Collect all logs from all orders
  const allLogs=[];
  orders.forEach(o=>{
    if(o.user_log){
      try{
        JSON.parse(o.user_log).forEach(e=>allLogs.push(e));
      }catch(e){}
    }
  });
  activityLog.forEach(e=>allLogs.push(e));
  // Deduplicate and sort
  allLogs.sort((a,b)=>new Date(b.time)-new Date(a.time));
  if(!allLogs.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--k-muted);padding:24px">No activity yet</td></tr>';return;}
  tbody.innerHTML=allLogs.slice(0,100).map(e=>`
    <tr>
      <td class="log-time">${e.time}</td>
      <td class="log-user">${e.user||'—'}</td>
      <td>${e.order||'—'}</td>
      <td class="log-action-${e.action}">${e.action||'—'}</td>
      <td style="color:var(--k-text-dim)">${e.note||''}</td>
    </tr>
  `).join('');
}

// ADMIN
function renderAdminUsers(){
  const list=document.getElementById('admin-user-list');
  list.innerHTML=staffList.map((n,i)=>`
    <div class="user-item">
      <span class="user-item-name">${n}</span>
      <button class="btn-remove" onclick="removeUser(${i})">Remove</button>
    </div>
  `).join('');
}

function removeUser(i){
  showModal('Remove staff member?',`Remove ${staffList[i]} from the login list?`,()=>{
    staffList.splice(i,1);
    localStorage.setItem('kennewell_staff',JSON.stringify(staffList));
    renderAdminUsers();renderNameGrid();
  });
}

function addUser(){
  const input=document.getElementById('new-user-input');
  const name=input.value.trim();
  if(!name) return;
  staffList.push(name);
  localStorage.setItem('kennewell_staff',JSON.stringify(staffList));
  input.value='';
  renderAdminUsers();renderNameGrid();
}

function tick(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:false});
}

renderNameGrid();
</script>
